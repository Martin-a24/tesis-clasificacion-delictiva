name: tesis
channels:
  - conda-forge
  - defaults
dependencies:
  # Python base
  - python=3.11
  - pip

  # Geoespatial (conda-forge para evitar conflictos con GDAL)
  - gdal
  - rasterio
  - geopandas
  - shapely
  - pyproj
  - fiona

  # Computacion cientifica
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn

  # Procesamiento de imagenes
  - pillow
  - opencv

  # Excel/CSV
  - openpyxl

  # Notebooks
  - jupyter
  - ipykernel

  # Utilidades
  - tqdm
  - pyyaml
  - requests

  # PyTorch y dependencias CNN (vía pip para soporte CUDA correcto)
  - pip:
      # PyTorch con CUDA 12.4 (compatible con drivers CUDA 12.x y 13.x)
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - torch
      - torchvision
      - torchaudio

      # Grad-CAM para interpretabilidad (Objetivo 3)
      - grad-cam